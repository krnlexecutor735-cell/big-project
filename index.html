<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Script Hider · สร้างลิงก์ซ่อนสคริป Roblox</title>
    <style>
        * { box-sizing: border-box; font-family: system-ui, 'Segoe UI', sans-serif; }
        body { background: linear-gradient(145deg, #0b0f1c 0%, #0a0e1a 100%); min-height: 100vh; margin: 0; padding: 2rem 1rem; display: flex; justify-content: center; align-items: center; }
        .card { max-width: 900px; width: 100%; background: rgba(18,22,35,0.9); border-radius: 2rem; box-shadow: 0 25px 45px -12px black; border: 1px solid #2a2f42; overflow: hidden; }
        .header { background: #0f121f; padding: 1.5rem 2rem; border-bottom: 1px solid #2a2f42; }
        .header h1 { margin: 0; font-size: 1.8rem; background: linear-gradient(135deg, #fff, #b3c7ff); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .content { padding: 2rem; }
        textarea { width: 100%; padding: 1rem; background: #0c0f17; border: 1px solid #2d324b; border-radius: 1.2rem; color: #eef2ff; font-family: monospace; font-size: 0.85rem; resize: vertical; }
        button { background: #2a2f4b; border: none; padding: 0.7rem 1.5rem; border-radius: 2rem; font-weight: 600; color: white; cursor: pointer; transition: 0.2s; }
        button.primary { background: #5f7aff; box-shadow: 0 4px 12px rgba(95,122,255,0.3); }
        button.primary:hover { background: #4a66e8; transform: translateY(-1px); }
        .result { margin-top: 1.5rem; background: #0b0e16; border-radius: 1.5rem; padding: 1rem; border-left: 4px solid #5f7aff; word-break: break-all; }
        .status { color: #8e9ac0; margin-top: 1rem; }
        .error { color: #ff9e8f; background: #2e1a1f; padding: 0.5rem 1rem; border-radius: 1rem; }
        hr { border-color: #252b42; margin: 1rem 0; }
    </style>
</head>
<body>
<div class="card">
    <div class="header">
        <h1>🔒 Script Hider · เหมือน Luarmor</h1>
        <p>ใส่สคริปของคุณ → ได้ลิงก์ที่โหลดแล้วได้สคริปจริง แต่เปิดในเบราว์เซอร์จะไม่เห็น</p>
    </div>
    <div class="content">
        <label>📜 วางสคริป Roblox Lua ที่ต้องการซ่อน</label>
        <textarea id="scriptInput" rows="8" placeholder="print('Hello world!')&#10;-- สคริปของคุณ"></textarea>
        <div style="display: flex; gap: 1rem; margin: 1rem 0;">
            <button id="createBtn" class="primary">✨ สร้างลิงก์ซ่อนสคริป</button>
        </div>
        <div id="statusArea" class="status"></div>
        <div id="resultArea" style="display: none;" class="result">
            <div style="font-weight: bold; margin-bottom: 8px;">🔗 ลิงก์ที่ใช้ใน loadstring:</div>
            <code id="generatedLink" style="background:#00000040; padding: 0.5rem; display: block; border-radius: 12px; overflow-x: auto;"></code>
            <div style="margin-top: 12px;">
                <button id="copyBtn">📋 คัดลอก</button>
                <button id="testBtn">🧪 ทดลองเปิดในเบราว์เซอร์</button>
            </div>
            <hr>
            <div style="font-size:0.85rem; color:#aab3d4;">✨ ตัวอย่างการใช้ใน Roblox:<br>
            <code style="background:#00000060; display: inline-block; padding: 6px 12px; border-radius: 12px;">loadstring(game:HttpGet("ลิงก์ที่ได้"))()</code>
            </div>
        </div>
    </div>
</div>

<script>
    // 🔁 ใส่ URL ของ Cloudflare Worker ที่คุณ deploy ตรงนี้
    const WORKER_URL = "https://script-hider.คุณ.workers.dev";   // <--- แก้ไขเป็น URL จริง

    const scriptInput = document.getElementById('scriptInput');
    const createBtn = document.getElementById('createBtn');
    const statusArea = document.getElementById('statusArea');
    const resultArea = document.getElementById('resultArea');
    const generatedLinkSpan = document.getElementById('generatedLink');
    const copyBtn = document.getElementById('copyBtn');
    const testBtn = document.getElementById('testBtn');

    let lastLink = '';

    createBtn.addEventListener('click', async () => {
        const script = scriptInput.value.trim();
        if (!script) {
            statusArea.innerHTML = '<span class="error">⚠️ กรุณาใส่สคริปก่อน</span>';
            return;
        }
        statusArea.innerHTML = '🔄 กำลังสร้างลิงก์...';
        resultArea.style.display = 'none';
        try {
            const response = await fetch(`${WORKER_URL}/create`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ script: script })
            });
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const data = await response.json();
            if (data.link) {
                lastLink = data.link;
                generatedLinkSpan.innerText = lastLink;
                resultArea.style.display = 'block';
                statusArea.innerHTML = '✅ สร้างลิงก์สำเร็จ! ใช้กับ loadstring ได้ทันที';
            } else {
                throw new Error('ไม่ได้รับลิงก์');
            }
        } catch (err) {
            statusArea.innerHTML = `<span class="error">❌ เกิดข้อผิดพลาด: ${err.message}<br>ตรวจสอบว่า Worker URL ถูกต้องและ Worker กำลังทำงาน</span>`;
            console.error(err);
        }
    });

    copyBtn.addEventListener('click', () => {
        if (lastLink) {
            navigator.clipboard.writeText(lastLink);
            copyBtn.innerText = '✅ คัดลอกแล้ว';
            setTimeout(() => copyBtn.innerText = '📋 คัดลอก', 1500);
        }
    });

    testBtn.addEventListener('click', () => {
        if (lastLink) window.open(lastLink, '_blank');
    });
</script>
</body>
</html>
